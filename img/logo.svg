<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 62" role="img" aria-label="12B Logo">
  <!-- White background -->
  <rect width="130" height="62" rx="4" fill="#ffffff"/>
  <!-- Red box behind B -->
  <rect x="82" y="2" width="44" height="58" rx="4" fill="#cc0000"/>
  <!-- "12" in dark/charcoal -->
  <text
    x="40" y="50"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="54"
    font-weight="900"
    font-style="italic"
    letter-spacing="-2"
    fill="#1a1a1a"
  >12</text>
  <!-- "B" in white on red -->
  <text
    x="104" y="50"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="54"
    font-weight="900"
    font-style="italic"
    fill="#ffffff"
  >B</text>
</svg>
